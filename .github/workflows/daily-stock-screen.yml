name: Daily ai-hedge-fund stock screen

on:
  schedule:
    # Asia/Taipei 09:00 = UTC 01:00
    - cron: "0 1 * * 1-5"
    # Asia/Taipei 14:40 = UTC 06:40
    - cron: "40 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Taipei

jobs:
  screen-and-update-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run stock screen and update Excel plan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FINANCIAL_DATASETS_API_KEY: ${{ secrets.FINANCIAL_DATASETS_API_KEY }}
        run: |
          poetry run python scripts/daily_stock_screen.py \
            --config config/stock_screen_config.json \
            --out reports/holding_plan.xlsx \
            --summary reports/latest_screen_summary.md \
            --run-log reports/run_log.jsonl

      - name: Upload Excel plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: holding-plan-${{ github.run_id }}
          path: |
            reports/holding_plan.xlsx
            reports/latest_screen_summary.md
            reports/run_log.jsonl

      - name: Commit updated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/holding_plan.xlsx reports/latest_screen_summary.md reports/run_log.jsonl
          git commit -m "chore: update daily stock screen report" || echo "No report changes to commit"
          git push
